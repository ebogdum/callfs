services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: callfs
      POSTGRES_USER: callfs
      POSTGRES_PASSWORD: callfs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callfs -d callfs"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --appendonly no --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /data

  node1:
    image: callfs:test
    volumes:
      - ./configs/node1.yaml:/config.yaml:ro
    command: ["server", "--config", "/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/callfs-healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /data
      - /raft-data

  node2:
    image: callfs:test
    volumes:
      - ./configs/node2.yaml:/config.yaml:ro
    command: ["server", "--config", "/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      node1:
        condition: service_started
    healthcheck:
      test: ["CMD", "/callfs-healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /data
      - /raft-data

  node3:
    image: callfs:test
    volumes:
      - ./configs/node3.yaml:/config.yaml:ro
    command: ["server", "--config", "/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
      node1:
        condition: service_started
    healthcheck:
      test: ["CMD", "/callfs-healthcheck"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /data
      - /raft-data

networks:
  default:
    name: callfs-test-network
